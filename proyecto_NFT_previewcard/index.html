<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>

    <style>
        
        * {
            box-sizing: border-box;
        }

        
        body {
            min-height: 100vh;
            background-color: rgb(5, 6, 53);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0; /* Saca los márgenes por defecto del body */
            font-family: "Gill Sans", sans-serif;
        }

        
        .card {
            display: flex;
            flex-direction: column;
            background-color: rgb(7, 47, 100);
            width: 350px;
            padding: 25px; /* Da aire a todo hacia adentro */
            border-radius: 15px;
            
        }

        /* magen principal corregida (ya no afecta al avatar) */
        .imagen-principal {
            width: 100%;
            height: 330px;
            border-radius: 10px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        /* textos base */
        .card h1 {
            color: white;
            font-size: 22px;
            margin: 0 0 15px 0;
        }

        .descripcion {
            color: #8bacd9;
            line-height: 1.5;
            margin: 0 0 20px 0;
        }

        /* bloque horizontal de precios y tiempo */
        .info-cripto {
            display: flex;
            justify-content: space-between; /* uno de cada lado */
            align-items: center;
            margin-bottom: 20px;
        }

        
        .precio, .tiempo {
            display: flex;
            align-items: center;
        }

        .precio {
            color: cyan;
            font-weight: bold;
        }

        .tiempo {
            color: #8bacd9;
        }

        
        .card hr {
            width: 100%;
            border: none;
            border-top: 1px solid #2e405a;
            margin: 0 0 20px 0;
        }

        
        .creador {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .creador p {
            color: #8bacd9;
            margin: 0;
        }

        .nombre-creador {
            color: white;
        }
    </style>

</head>
<body>

    <article class="card">
        <img class="imagen-principal" src="https://images.unsplash.com/photo-1518546305927-5a555bb7020d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Equilibrium #3429">
        
        <h1>Equilibrium #3429</h1>
        <p class="descripcion">Our Equilibrium collection promotes balance and calm.</p>
        
        <div class="info-cripto">
            <div class="precio">
                <span>💎</span> <span>0.041 ETH</span>
            </div>
            <div class="tiempo">
                <span>⏱</span> <span>3 days left</span>
            </div>
        </div>

        <hr>
        
        <div class="creador">
            <img class="avatar" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=100&q=80" alt="Avatar">
            <p>Creation of <span class="nombre-creador">Jules Wyvern</span></p>
        </div>
    </article>

</body>
</html>
