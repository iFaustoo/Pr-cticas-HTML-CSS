<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .profile {
            background-color: rgb(32, 31, 31);
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 150px;
        }

        .inside-profile {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .inside-profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
        }

        .inside-profile h5 {
            color: white;
            font-size: 24px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .inside-profile span {
            color: rgb(146, 216, 65);
            font-size: 18px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        }

        .inside-profile p {
            color: rgb(88, 85, 85);
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .links {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            gap: 20px;
            width: 100%;
            padding-top: 10px;
        }

        .inside-links {
            display: block;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            background-color: rgb(51, 51, 51);
            width: 100%;
            border-radius: 5px;
        }

        .inside-links a {
            display: block;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
        }
        
        .inside-links:hover {
            background-color: rgb(146, 216, 65);
        }

        .inside-links:hover a {
            color: rgb(32, 31, 31);
        }
        
    </style>

</head>

<body>

    <article class="profile">
        <div class="inside-profile">
            <img src="https://www.svgrepo.com/show/512733/profile-round-1346.svg" alt="Perfil de HTML">
            <h5>Fausto Rodriguez</h5>
            <span>Entre Ríos, Argentina</span>
            <p>"Front-end and Back-end developer"</p>
        </div>

        <div class="links">
            <div class="inside-links">
                <a href="https://github.com/iFaustoo/Pr-cticas-HTML-CSS" target="_blank">GitHub</a>
            </div>

            <div class="inside-links">
                <a href="https://www.frontendmentor.io/" target="_blank">Frontend Projects</a>
            </div>

            <div class="inside-links">
                <a href="https://www.linkedin.com/in/fausto-rodriguez-bruchmann-64b71b380/" target="_blank">Linkedin</a>
            </div>

            <div class="inside-links">
                <a href="https://www.instagram.com/faustoo.rodriguez" target="_blank">Instagram</a>
            </div>

            <div class="inside-links">
                <a href="https://x.com/" target="_blank">Twitter</a>
            </div>

        </div>

    </article>

</body>

</html>
